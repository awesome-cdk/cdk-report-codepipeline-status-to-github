name: CI

on:
  push:
    branches: [ master ]

  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upgrade npm for OIDC trusted publishing
        run: corepack enable npm && npm install -g npm@11.12.1

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: true

      - name: Build
        run: pnpm --filter @awesome-cdk/cdk-report-codepipeline-status-to-github run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @awesome-cdk/cdk-report-codepipeline-status-to-github exec npx semantic-release
